<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | THE LOCAL DX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .thanks-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 1.5rem;
        }

        .thanks-content {
            background: var(--white);
            padding: 4rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
        }

        .thanks-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .thanks-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .thanks-text {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .btn-home {
            display: inline-block;
            background: var(--primary);
            color: var(--white);
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            transition: var(--transit);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="thanks-container">
        <div class="thanks-content">
            <span class="thanks-icon">✉️</span>
            <h1 class="thanks-title">送信完了</h1>
            <p class="thanks-text">
                お問い合わせありがとうございます。<br>
                内容を確認の上、通常<strong>3日以内</strong>にお返事いたします。<br>
                恐れ入りますが、今しばらくお待ちください。
            </p>
            <a href="index.html" class="btn-home">トップページへ戻る</a>
        </div>
    </div>
</body>

</html>
